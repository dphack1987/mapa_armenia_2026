<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compartir · Mapa Armenia 2026</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/decoraciones.css" />
  <link rel="stylesheet" href="css/compartir.css" />
</head>
<body class="compartir-page">
  <main class="compartir-card">
    <a href="index.html" class="compartir-back">← Volver al mapa</a>
    <img src="logo_armenia.png" alt="Mapa Armenia 2026" class="compartir-logo" />
    <h1>Comparte el mapa</h1>
    <p class="compartir-lead">Escanea el código QR para abrir la guía turística, comercial y gastronómica de Armenia.</p>

    <figure class="qr-wrap qr-wrap--pauta">
      <img
        id="qr-pauta-img"
        class="compartir-qr-pauta"
        src="assets/qr-mapa-armenia-display.jpg"
        alt="QR Mapa Turístico Comercial y Gastronómico Armenia 2026"
        loading="eager"
      />
      <figcaption class="compartir-qr-note">
        También disponible para imprimir · Turismo, comercio y sabor
      </figcaption>
    </figure>

    <p class="share-url"><a id="share-link" href="#" target="_blank" rel="noopener"></a></p>

    <div class="compartir-actions">
      <a id="btn-open" class="btn btn-secondary" href="#">Abrir mapa</a>
      <button type="button" id="btn-download" class="btn btn-secondary">Descargar imagen QR</button>
    </div>
  </main>

  <script src="js/compartir.js" type="module"></script>
</body>
</html>
